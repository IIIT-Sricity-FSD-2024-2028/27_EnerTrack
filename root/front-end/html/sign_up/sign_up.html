<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="format-detection"
      content="telephone=no, email=no, address=no"
    />
    <title>EnerTrack Sign Up</title>
    <link rel="stylesheet" href="../../css/sign_up/sign_up.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>
    <!-- BACKGROUND -->
    <div class="background">
      <img src="../../assets/Background_image.png" alt="background" />
    </div>

    <!-- TOP BAR -->
    <div class="top-bar">
      <a href="../landing/landing.html" class="logo">
        <img src="../../assets/logo.png" alt="EnerTrack Logo" />
      </a>
    </div>

    <!-- MAIN WRAPPER -->
    <div class="main">
      <!-- CARD -->
      <div class="card">
        <h1>Sign Up</h1>
        <p class="sub">Create a free account</p>

        <form id="signUpForm" novalidate>
          <!-- Name -->
          <input
            type="text"
            id="name"
            placeholder="e.g. John Doe"
            class="input"
            autocomplete="off"
          />

          <span class="field-error" id="nameError"></span>

          <!-- Email -->
          <input
            type="email"
            id="email"
            placeholder="e.g. john.doe@example.com"
            class="input"
            autocomplete="off"
          />

          <span class="field-error" id="emailError"></span>

          <!-- Phone -->
          <input
            type="tel"
            id="phone"
            placeholder="e.g. 9876543210"
            class="input"
            autocomplete="off"
            maxlength="10"
          />
          <span class="field-error" id="phoneError"></span>

          <!-- Password -->
          <div class="password-wrap">
            <input
              type="password"
              id="password"
              placeholder="e.g. Str0ng@Pass!"
              class="input"
              autocomplete="new-password"
            />
            <span class="eye" id="togglePassword" onclick="togglePass()">
              <!-- Crossed-out eye (hidden) -->
              <svg
                id="eyeClosed"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="rgba(255,255,255,0.7)"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M17.94 17.94A10.94 10.94 0 0 1 12 20C6 20 1.73 14 1.73 12c0-.9.6-2.3 1.7-3.7"
                />
                <path
                  d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6 0 10.27 6 10.27 8 0 .73-.22 1.6-.67 2.5"
                />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
              <!-- Open eye (visible) -->
              <svg
                id="eyeOpen"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="rgba(255,255,255,0.7)"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                style="display: none"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </span>
          </div>

          <span class="field-error" id="passwordError"></span>

          <!-- Confirm Password -->
          <div class="password-wrap">
            <input
              type="password"
              id="confirmPassword"
              placeholder="Re-enter your password"
              class="input"
              autocomplete="new-password"
            />
            <span
              class="eye"
              id="toggleConfirmPassword"
              onclick="toggleConfirmPass()"
            >
              <!-- Crossed-out eye (hidden) -->
              <svg
                id="eyeClosedConfirm"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="rgba(255,255,255,0.7)"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M17.94 17.94A10.94 10.94 0 0 1 12 20C6 20 1.73 14 1.73 12c0-.9.6-2.3 1.7-3.7"
                />
                <path
                  d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6 0 10.27 6 10.27 8 0 .73-.22 1.6-.67 2.5"
                />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
              <!-- Open eye (visible) -->
              <svg
                id="eyeOpenConfirm"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="rgba(255,255,255,0.7)"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
                style="display: none"
              >
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
            </span>
          </div>

          <span class="field-error" id="confirmPasswordError"></span>

          <!-- Role dropdown -->
          <div class="select-wrap">
            <select id="role" class="input select" autocomplete="off">
              <option value="" disabled selected hidden>Role</option>
              <option value="Campus Visitor">Campus Visitor</option>
              <option value="System Administrator">System Administrator</option>
              <option value="Financial Analyst">Financial Analyst</option>
              <option value="Technician">Technician</option>
              <option value="Technician Administrator">
                Technician Administrator
              </option>
              <option value="Sustainability Officer">
                Sustainability Officer
              </option>
            </select>
            <span class="chevron">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="rgba(255,255,255,0.7)"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="6 9 12 15 18 9" />
              </svg>
            </span>
          </div>

          <span class="field-error" id="roleError"></span>

          <!-- Submit -->
          <button type="submit" class="btn" id="signUpBtn">Sign Up</button>
        </form>

        <!-- Footer -->
        <div class="footer">
          <p>Already have an account?</p>
          <a href="../sign_in/sign_in.html" class="signin-link">Sign in</a>
        </div>
      </div>
    </div>

    <!-- Duplicate Account Popup -->
    <div class="popup-overlay" id="duplicatePopup" style="display: none">
      <div class="popup-card">
        <h3 id="popupTitle">Account Already Exists</h3>
        <p id="popupMsg">An account with this information already exists.</p>
        <div class="popup-actions">
          <button class="popup-btn popup-btn-secondary" id="popupClose">
            Go Back
          </button>
          <a href="../sign_in/sign_in.html" class="popup-btn popup-btn-primary"
            >Sign In Instead</a
          >
        </div>
      </div>
    </div>

    <!-- Mock Data -->
    <script src="../../js/shared/mockData.js"></script>
    <!-- API Client -->
    <script src="../../js/shared/api.js"></script>
    <!-- Validation Logic -->
    <script src="../../js/sign_up/sign_up.js"></script>
  </body>
</html>
