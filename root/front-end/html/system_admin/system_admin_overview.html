<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - EnerTrack</title>
    <link rel="stylesheet" href="../../css/system_admin/system_admin_overview.css">
</head>

<body>
    <div class="dashboard-shell">
        <aside class="sidebar" aria-label="Admin navigation">
            <a href="system_admin_overview.html" class="sidebar-logo" aria-label="EnerTrack admin dashboard">
                <img class="logo-icon" src="../../assets/SVG.png" alt="">
                <img class="logo-text" src="../../assets/EnerTrack_text.png" alt="EnerTrack">
            </a>

            <nav class="sidebar-nav">
                <span class="nav-section-title">ADMIN DASHBOARD</span>
                <button class="nav-subitem active" type="button" data-admin-tab="users">
                    <span class="nav-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                    </span>
                    User Management
                </button>
                <button class="nav-subitem" type="button" data-admin-tab="infrastructure">
                    <span class="nav-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24">
                            <path d="M3 21h18"></path>
                            <path d="M5 21V7l8-4v18"></path>
                            <path d="M19 21V11l-6-4"></path>
                            <path d="M9 9v.01"></path>
                            <path d="M9 13v.01"></path>
                            <path d="M9 17v.01"></path>
                        </svg>
                    </span>
                    Infrastructure
                </button>
            </nav>

            <div class="profile-card" aria-label="Current admin profile">
                <img src="../../assets/logo.png" alt="" class="profile-img">
                <div class="profile-info">
                    <strong id="sidebarUserName">Aadithya Mouli</strong>
                    <span id="sidebarUserRole">System Administrator</span>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 id="welcomeHeading">Welcome back, Aadithya</h1>
                    <p id="pageSubheading">Manage DB-aligned users, campuses, buildings, and meter inventory.</p>
                </div>
                <button class="btn-outline" type="button" id="resetDemoData">Reset demo data</button>
            </header>

            <section id="adminApp" class="admin-app" aria-live="polite"></section>
        </main>
    </div>

    <script type="module" src="../../js/system_admin/overview.js"></script>
</body>

</html>
