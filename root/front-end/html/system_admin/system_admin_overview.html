<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - EnerTrack</title>
    <link rel="stylesheet" href="../../css/system_admin/system_admin_overview.css">
</head>

<body>
    <div class="dashboard-shell">
        <aside class="sidebar" aria-label="Admin navigation">
            <a href="system_admin_overview.html" class="sidebar-logo" aria-label="EnerTrack admin dashboard">
                <img class="logo-icon" src="../../assets/SVG.png" alt="">
                <img class="logo-text" src="../../assets/EnerTrack_text.png" alt="EnerTrack">
            </a>

            <nav class="sidebar-nav">
                <span class="nav-section-title">ADMIN DASHBOARD</span>
                <button class="nav-subitem active" type="button" data-admin-tab="users">
                    <span class="nav-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24">
                            <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path>
                            <circle cx="9" cy="7" r="4"></circle>
                            <path d="M22 21v-2a4 4 0 0 0-3-3.87"></path>
                            <path d="M16 3.13a4 4 0 0 1 0 7.75"></path>
                        </svg>
                    </span>
                    User Management
                </button>
                <button class="nav-subitem" type="button" data-admin-tab="infrastructure">
                    <span class="nav-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24">
                            <path d="M3 21h18"></path>
                            <path d="M5 21V7l8-4v18"></path>
                            <path d="M19 21V11l-6-4"></path>
                            <path d="M9 9v.01"></path>
                            <path d="M9 13v.01"></path>
                            <path d="M9 17v.01"></path>
                        </svg>
                    </span>
                    Infrastructure
                </button>
            </nav>

            <div class="profile" id="sidebarProfile" aria-label="Current admin profile">
                <img src="https://i.pravatar.cc/100" alt="Profile" id="sidebarUserImg">
                <div>
                    <div class="profile-name" id="sidebarUserName">Loading...</div>
                    <div class="profile-role" id="sidebarUserRole">System Admin</div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="page-header">
                <div>
                    <h1 id="welcomeHeading">Welcome back, Aadithya</h1>
                    <p id="pageSubheading">Manage DB-aligned users, campuses, buildings, and meter inventory.</p>
                </div>
                <button class="btn-outline" type="button" id="resetDemoData">Reset demo data</button>
            </header>

            <section id="adminApp" class="admin-app" aria-live="polite"></section>
        </main>
    </div>

    <script type="module" src="../../js/system_admin/overview.js"></script>
    <script>
    (function () {
        "use strict";

        var userData = localStorage.getItem("currentUser");
        if (!userData) {
            /* Fallback: resolve admin user from universalDB (the shared backend) */
            try {
                var dbRaw = localStorage.getItem("enertrack_universal_v1");
                if (dbRaw) {
                    var db = JSON.parse(dbRaw);
                    if (db.users && Array.isArray(db.users)) {
                        for (var u = 0; u < db.users.length; u++) {
                            if (db.users[u].role === "System Administrator") {
                                var adminUser = {
                                    user_id: db.users[u].user_id,
                                    name: db.users[u].name,
                                    email: db.users[u].email,
                                    role: "System Admin"
                                };
                                localStorage.setItem("currentUser", JSON.stringify(adminUser));
                                userData = localStorage.getItem("currentUser");
                                break;
                            }
                        }
                    }
                }
            } catch (_) {}

            if (!userData) {
                /* Last resort: use sidebar DOM text */
                var nameEl = document.getElementById("sidebarUserName");
                var roleEl = document.getElementById("sidebarUserRole");
                if (nameEl && roleEl && nameEl.textContent.trim() && nameEl.textContent.trim() !== "Loading...") {
                    var fallback = { name: nameEl.textContent.trim(), role: roleEl.textContent.trim() };
                    localStorage.setItem("currentUser", JSON.stringify(fallback));
                    userData = localStorage.getItem("currentUser");
                } else { return; }
            }
        }

        var user = JSON.parse(userData);
        var firstName = user.name.split(" ")[0];

        /* Populate sidebar */
        var el = document.getElementById("welcomeHeading");
        if (el) el.textContent = "Welcome back, " + firstName;
        var sn = document.getElementById("sidebarUserName");
        if (sn) sn.textContent = user.name;
        var sr = document.getElementById("sidebarUserRole");
        if (sr) sr.textContent = user.role;

        /* Inject popup CSS */
        var style = document.createElement("style");
        style.textContent =
            ".dash-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);backdrop-filter:blur(4px);z-index:9999;display:none;align-items:center;justify-content:center;}" +
            ".dash-popup-overlay.open{display:flex;}" +
            ".dash-popup-card{background:#fff;border:2px solid rgba(0,0,0,0.1);border-radius:16px;padding:28px 24px 20px;width:320px;max-width:90vw;box-shadow:0 20px 60px rgba(0,0,0,0.15);}" +
            ".dash-popup-name{color:#111;font-family:Georgia,'Times New Roman',serif;font-size:18px;font-weight:600;margin-bottom:2px;}" +
            ".dash-popup-role{color:#555;font-size:13px;margin-bottom:16px;font-weight:500;}" +
            ".dash-popup-divider{height:1px;background:rgba(0,0,0,0.1);margin:0 0 8px;}" +
            ".dash-popup-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:10px;font-size:14px;font-weight:500;color:#333;text-decoration:none;transition:background .15s,color .15s;border:none;background:none;width:100%;cursor:pointer;font-family:'Inter',system-ui,sans-serif;}" +
            ".dash-popup-item:hover{background:rgba(47,125,79,0.08);color:#2f7d4f;}" +
            ".dash-popup-item svg{flex-shrink:0;opacity:0.55;}" +
            ".dash-popup-item:hover svg{opacity:1;stroke:#2f7d4f;}" +
            ".dash-popup-logout{color:#dc2626;}" +
            ".dash-popup-logout:hover{background:rgba(220,38,38,0.08);color:#dc2626;}" +
            ".dash-popup-logout:hover svg{stroke:#dc2626;}";
        document.head.appendChild(style);

        /* Build popup — admin profile + sign out only */
        var linksHTML =
            '<a href="../system_admin/system_admin_overview.html" class="dash-popup-item">' +
                '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>' +
                'System Administration</a>' +
            '<a href="../sustainability_officer/sust_overview.html" class="dash-popup-item">' +
                '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 2 8a7 7 0 0 1-7 7c0 1 0 3-2 3z"/></svg>' +
                'Sustainability Dashboard</a>' +
            '<a href="../technician_jr/technician_jr_work_orders.html" class="dash-popup-item">' +
                '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg>' +
                'My Work Orders</a>' +
            '<a href="../technician/technician_overview.html" class="dash-popup-item">' +
                '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>' +
                'Technician Admin Dashboard</a>' +
            '<a href="../finance-analyst/finance_overview.html" class="dash-popup-item">' +
                '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>' +
                'Finance Analyst Dashboard</a>' +
            '<a href="../enduser/enduser_dashboard.html" class="dash-popup-item">' +
                '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></svg>' +
                'Report an Issue</a>' +
            '<div class="dash-popup-divider" style="margin-top:8px;"></div>';

        var popupHTML =
            '<div class="dash-popup-overlay" id="dashProfilePopup">' +
                '<div class="dash-popup-card">' +
                    '<div class="dash-popup-name">' + user.name + '</div>' +
                    '<div class="dash-popup-role">' + user.role + '</div>' +
                    '<div class="dash-popup-divider"></div>' +
                    linksHTML +
                    '<button class="dash-popup-item dash-popup-logout" id="dashLogoutBtn" type="button">' +
                        '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>' +
                        'Sign Out</button>' +
                '</div>' +
            '</div>';

        document.body.insertAdjacentHTML("beforeend", popupHTML);
        var popup = document.getElementById("dashProfilePopup");

        /* Click profile to open */
        var profileCards = document.querySelectorAll(".profile-card, .profile");
        for (var i = 0; i < profileCards.length; i++) {
            profileCards[i].style.cursor = "pointer";
            profileCards[i].addEventListener("click", function (e) {
                e.preventDefault(); e.stopPropagation();
                popup.classList.add("open");
            });
        }

        /* Close on overlay click */
        popup.addEventListener("click", function (e) {
            if (e.target === popup) popup.classList.remove("open");
        });

        /* Sign Out */
        document.getElementById("dashLogoutBtn").addEventListener("click", function () {
            localStorage.removeItem("currentUser");
            window.location.href = "../landing/landing.html";
        });
    })();
    </script>
</body>

</html>
