# Domain: Sustainability and Green Economy
# Problem Statement: Campus Energy and Renewables Management
# Last Updated: 2026-03-28
- name: System
  definition: The core software and underlying infrastructure of the Campus Energy & Renewables Management Platform. It requires ongoing oversight, updates, and troubleshooting by the System Administrator to ensure reliable operation.
  examples:
    - "The System requires a complete data backup before new updates are applied."
    - "If the System goes offline, technicians will not receive real-time anomaly alerts."
  aliases:
    - Application
    - App
    - Software
    
- name: Dashboard
  definition: The primary user interface presented to any authenticated user immediately after login. It acts as a centralized, role-specific control panel that provides access to all authorized system operations, monitoring tools, and features relevant to that user's role.
  examples:
    - "Upon successful login, the system automatically routes the user to their respective Dashboard based on their assigned role."
  aliases:
    - User Dashboard
    - Main Interface
  
- name: System Administrator
  definition: A technical person responsible for monitoring and maintaining the system of the Campus Energy & Renewables Management Platform. This role oversees system-level operations, including setting up data, monitoring performance metrics and analytics of Energy consumption and ensuring the smooth functioning of all activities within the energy management system.
  examples:
    - "The System Administrator is setting energy limits for a building."
    - "The System Administrator is gathering a monthly data report showing total campus electricity usage."
    - "A system administrator sets up user access permissions."
  aliases:
    - System Manager
    - Technical Administrator

- name: System Monitoring
  definition: An activity performed by the System Administrator when he/she decides to select monitoring as operation to check on the system. The System Administrator will have the option to view system status, monitor performance metrics, and check alerts and logs.
  examples:
    - "The System Administrator will select monitoring to view system status for the campus energy grid."
  aliases:
    - Health monitoring
  
- name: System Alert
  definition: A warning created by the system when it spots a possible fault. The administrator will check alerts and logs to see these warnings, which tells them it is time to start troubleshooting to identify the issue and fix it.
  examples:
    - "The administrator reads the system alert so they can identify the issue and resolve system issues."
  aliases:
    - System Warning
    
- name: System Maintenance
  definition: An activity performed by the System Administrator when he/she decides to select maintenance as operation in the dashboard and then must select a task. If the task is updation, the system administrator will execute data backup, apply system updates, update data, and check if there are any errors. If the task is troubleshooting, the system administrator will identify the issue and resolve system issues. After finishing a task, the user chooses whether to continue the process or stop.
  examples:
    - "The system administrator will select maintenance and choose the updation task to apply system updates."
    - "When there is a fault, the system administrator can choose troubleshooting to identify the issue and resolve system issues."
  aliases:
    - App Maintenance

- name: Finance Analyst
  definition: A user who interacts with the system to calculate utility costs, generate reports, and evaluate the financial impacts of energy projects. The user can also select generate reports to export this data as a PDF or CSV. Furthermore, they evaluate new projects by calculating financial metrics (like ROI and NPV) and performing trend analysis to determine if an investment is financially viable.
  examples:
    - "The Finance Analyst will calculate utility costs to see exactly how much money the academic building's appliances cost to run last month."
    - "The Finance Analayst will select generate reports to export the recent utility data as a PDF for the university management."
    - "Before approving the new solar panels, the Finance Analyst will calculate financial metrics to ensure the project is financially viable."
  aliases:
    - Financial Analyst
    - Financial Staff

 - name: Financial Report
  definition: A generated summary of energy costs and savings. The finance analyst creates it by configuring settings such as select filters, select time period, select category, and select data scope, and then clicking generate report. The system then displays a report preview showing projected costs, actual versus budget comparisons, and top cost drivers before the user chooses an output format to export as PDF or CSV.
  examples:
    - "The Finance Analyst generated a monthly Financial Report to see the actual versus budget status for the campus electricity."
    - "After viewing the report preview, the user decided to export as PDF to share the identified savings with the university management."
  aliases:
    - Cost Report
    - Financial Summary
    
- name: Utility
  definition: A set of appliances that consume electricity for a selected department, a specific building, or the entire campus over a given time period chosen by the financial analyst. The system uses this grouping to calculate utility costs and generate financial reports.
  examples:
    - "The Finance Analyst calculated the cost of the utility for the academic building to check last month's expenses."
    - "The user selected a specific time period to see how much the utility cost the science department."
  aliases:
    - Energy Load
    - Tracked Appliances 

- name: Budget
  definition: The approved financial allocation set for a specific utility (such as a selected department, building, or the entire campus) over a chosen time period. The system uses this target to compare against the actual cost, allowing the user to determine the budget variance and overall status (e.g., "Under budget" or "Needs review").
  examples:
    - "The Finance Analyst reviewed the Budget vs Actual cards to see if the academic building's utility stayed within its approved monthly budget."
    - "The system flagged the gas utility with a 'Needs review' status because its actual cost exceeded the budget."
  aliases:
    - Utility Budget
    - Approved Allocation

- name: Cost
  definition: The actual monetary expense incurred by a specific utility over a selected time period. The system calculates this current utility spend by combining retrieved consumption data with base utility rates, applicable tariffs, taxes, and demand charges before comparing it against the budget.
  examples:
    - "The actual cost for the science department's utility was higher than expected this month due to peak demand charges."
    - "The Finance Analyst used the cost breakdown panel to view the calculated cost of electricity, gas, and water utilities."
  aliases:
    - Actual Cost
    - Utility Spend

- name: ROI
  definition: A financial metric, expressed as a percentage, that measures the overall profitability of an energy project. It calculates the net savings gained relative to the initial capital cost. The system uses the ROI to automatically determine if a project is financially viable by checking if it meets the campus's required minimum threshold.
  examples:
    - "The Finance Analyst confirmed the solar panel installation was viable because its 18.6% ROI exceeded the 12% campus threshold."
    - "ROI allows the university management to quickly assess if the net savings justify the initial project spend."
  aliases:
    - Return on Investment
    - Profitability Rate

- name: Payback Period
  definition: A financial metric that calculates the exact timeframe required for an energy project to recover its initial implementation costs. Expressed in years, it indicates the break-even point where the accumulated energy savings equal the upfront capital investment.
  examples:
    - "The lighting upgrade has a Payback Period of 2.8 years, meaning the campus will fully recover its capital costs within that timeframe."
    - "The Finance Analyst prefers projects with a shorter Payback Period to minimize financial risk to the university."
  aliases:
    - Recovery Timeline
    - Break-Even Point

- name: NPV
  definition: A financial metric that represents the total, long-term value created by an energy project, measured in today's dollars. It calculates the projected future energy savings over the project's entire lifespan and subtracts the initial upfront costs to reveal the true financial benefit.
  examples:
    - "A positive NPV of $428K indicates that the energy project will generate significant long-term financial value for the university."
    - "If a proposed project yields a negative NPV, the Finance Analyst will recommend a review, as it will ultimately cost the campus more than it saves."
  aliases:
    - Net Present Value
    - Discounted Lifetime Value

- name: IRR
  definition: A financial metric, expressed as a percentage, that represents the annualized effective return rate of an energy project. It indicates the expected yearly growth or profit rate generated by the project's ongoing savings, allowing the university to compare it against standard investment benchmarks.
  examples:
    - "The Finance Analyst recommended the HVAC optimization because its 16.1% IRR outperformed the university's standard investment returns."
    - "IRR provides a standardized way to evaluate how efficiently the invested capital is generating annual savings."
  aliases:
    - Internal Rate of Return
    - Annualized Return

- name: Technician
  definition: An operational staff member who handles technical maintenance and troubleshooting of campus energy systems. This role responds to real-time alerts, diagnoses equipment malfunctions, performs maintenance activities,  and ensures the physical infrastructure supporting energy management operates reliably.
  examples:
    - "The technician gets an anomaly alert when a lab suddenly uses too much power at night."
    - "The technician finds that the broken AC is causing high power usage."
    - "The technician creates a repair task, fixes the AC, and marks the task as done."
  aliases:
    - Maintenance Technician
    - Maintenance Staff

- name: Sustainability Officer
  definition: A Sustainability Officer is responsible for planning and managing the institution’s sustainability efforts. They oversee eco-friendly initiatives on campus, track environmental impact like energy use and waste, prepare sustainability reports, and ensure the organisation meets environmental standards while promoting responsible practices.
  examples:
    - "The sustainability officer checks how much carbon emissions the campus produces."
    - "The sustainability officer starts an awareness program to save energy across the campus."
    - "The sustainability officer prepares a report showing energy savings and emissions reduced."
  aliases:
    - Sustainability Manager
    - Green Campus Officer (GCO)

- name: Report
  definition: A report is a system-generated summary that presents analyzed energy, cost, maintenance, or sustainability data for a selected time period, enabling stakeholders to review performance, make decisions, and track trends.A report has various forms some including visual representations in the form charts and graphs.
  examples:
    - "The GCO is generating the sustainability report for this quarter."
    - "The report will be forwarded to the university management by Thursday."
  aliases:
    - Document
    - Analytical Summary

- name: Anomaly alert
  definition: An anomaly alert is a real-time system notification generated when abnormal energy behavior is detected, informing maintenance personnel so that the issue can be promptly investigated and addressed.
  examples:
    - "The technician received an anomaly alert in the morning."
    - "The anomaly alert was very helpful for the technician to fix the faulty equipment."
  aliases:
    - Abnormality Alert
    - Alarm

    
- name: Real-Time Energy Data
  definition: The continuous stream of consumption information is monitored by the system to detect potential anomalies and report them to the technician if found.
  examples:
    - "Monitor Real-Time Energy Data for spikes."
    - "Real-Time Energy Data is missing for the academic block."
  aliases:
    - Live Data
    - Energy Data

- name: Maintenance work order
  definition: A maintenance work order is a task created by the system when the fault has been identified to be real by a technician. This maintenence task is later chosen by a technician to work and fix on faulty equipment(s).
  examples:
    - "The system has to create the maintenance work order for the technician to fix the faulty equipment in the most efficient way."
    - "The technician will not work on a faculty’s or student’s room without a maintenance work order that has been generated by the system."
  aliases:
    - Work order
  
- name: Maintenance Task
  definition : A maintenance task or maintenance work is a task chosen by a technician when an anomaly alert is detected from the meter data. This action includes finding if an alert is an false alarm, if its a legitimate alarm then based on the severity it is assigned to technician through a maintenance work order by providing details to the technician.
  examples:
    - "The maintenance task is created and is sent to the technician."
    - "We have assigned way too many maintenance tasks to the technician."
  aliases:
    - Maintenance work

- name: Fault 
  definition: A fault is an abnormal condition in an electrical load, meter, or subsystem where its behaviour or measured values deviate from the defined safe or expected operating range causing an anomaly alert, indicating a possible failure or malfunction that requires investigation or maintenance.
  examples:
    - "We are experiencing a fault in the appliances in the G07 room of the academic block."
    - "The fault we detected at G07 was fixed by the technician."
  aliases:
    - Appliance Fault
    
- name: Faulty Equipment
  definition: A faulty equipment is an electric or any energy-consuming equipment that is classified and confirmed as a fault by the techinican. It requires attention to be fixed by a technician based on the severity of the issue.
  examples:
    - "The AC in G07 is a fault equipment."
    - "The faulty equipment was fixed by the technician."
