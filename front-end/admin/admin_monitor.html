<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Monitor - EnerTrack</title>
    <link rel="stylesheet" href="admin_monitor.css">
    <link href="https://fonts.googleapis.com/css2?family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="dashboard">
        <!-- SIDEBAR -->
        <aside class="sidebar">
            <a href="admin_overview.html" class="sidebar-logo">
                <img class="logo-icon" src="images/SVG.png" alt="logo">
                <img class="logo-text" src="images/EnerTrack_text.png" alt="EnerTrack">
            </a>

            <nav class="sidebar-nav">

                <a href="admin_overview.html" class="nav-item">
                    <img src="images/maintenance_overview_unselected.png">
                    Overview
                </a>

                <div class="nav-section">
                    <a href="admin_monitor.html" class="nav-section-title active-pill">MONITORING</a>
                    <div class="nav-group">
                        <div class="nav-subitem">
                            <img src="images/maintenance_monitor.png">
                            System Health
                        </div>
                        <div class="nav-subitem">
                            <img src="images/maintenance_metric.png">
                            Performance Metrics
                        </div>
                        <div class="nav-subitem">
                            <img src="images/maintenance_alert.png">
                            Alerts
                            <span class="alerts-badge">3</span>
                        </div>
                    </div>
                </div>

                <div class="nav-section">
                    <a href="admin_maintain.html" class="nav-section-title">MAINTENANCE</a>
                    <div class="nav-group">
                        <div class="nav-subitem">
                            <img src="images/maintenance_backup.png">
                            Backups
                        </div>
                        <div class="nav-subitem">
                            <img src="images/maintenance_system.png">
                            System Updates
                        </div>
                        <div class="nav-subitem">
                            <img src="images/maintenance_troubleshooting.png">
                            Troubleshooting
                        </div>
                    </div>
                </div>
            </nav>

            <a href="#" class="profile-card">
                <div class="profile-img" aria-hidden="true">AM</div>
                <div class="profile-info">
                    <strong>Aadithya Mouli</strong>
                    <span>System Administrator</span>
                </div>
            </a>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <header class="page-header">
                <p>
                    Live monitoring: last refresh
                    <span id="refreshStamp">Just now</span>
                    • Auto-refresh every 30s
                </p>
            </header>

            <div class="content-grid-monitor">

                <!-- System Health Snapshot -->
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title">
                            <img src="images/monitoring_green_system_health.png" alt="System Health Snapshot">
                            System health snapshot
                        </div>
                        <button class="btn-secondary clickable" onclick="refreshMonitor()">
                            <img src="images/monitoring_refresh.png" alt="Manual Refresh">
                            Manual refresh
                        </button>
                    </div>

                    <!-- Dynamic system health cards rendered by monitor.js -->
                    <div id="systemHealthContainer"></div>
                </div>

                <!-- Active Alerts -->
                <div class="panel">
                    <div class="panel-header">
                        <div class="panel-title">
                            <img src="images/monitor_bell.png" alt="Active Alerts">
                            Active alerts
                        </div>
                    </div>

                    <!-- SLO card + dynamic alerts rendered by alerts.js / monitor.js -->
                    <div id="sloContainer"></div>
                    <div id="monitorAlertContainer"></div>
                </div>

            </div>

            <!-- Performance Metrics (Bottom) -->
            <div class="panel mt-24">
                <div class="panel-header">
                    <div class="panel-title">
                        <img src="images/monitoring_perf.png" alt="Performance Metrics">
                        Performance metrics
                    </div>
                </div>

                <!-- Dynamic metrics rendered by monitor.js -->
                <div id="perfMetricsContainer"></div>
            </div>
        </main>
    </div>

    <script type="module" src="js/monitorPage.js"></script>
</body>

</html>
