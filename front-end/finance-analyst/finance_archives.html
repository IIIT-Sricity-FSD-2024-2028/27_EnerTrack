<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>EnerTrack – Archives</title>
  <link rel="stylesheet" href="finance_overview.css">
  <link rel="stylesheet" href="finance_shared.css">
  <style>
    .ticket-card {
      background: white;
      padding: 18px 20px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 0;
      transition: box-shadow .2s;
    }
    .ticket-card:hover { box-shadow: 0 4px 12px -2px var(--shadow); }
    .ticket-location {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #374151;
      background: #f3f4f6;
      padding: 2px 8px;
      border-radius: 4px;
      margin-top: 6px;
    }
    .ticket-priority {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      display: inline-block;
    }
    .p-Low { background: #f0fdf4; color: #166534; }
    .p-Medium { background: #fffbeb; color: #92400e; }
    .p-High { background: #fef2f2; color: #991b1b; }
    .ticket-status {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }
    .status-finalized { background: #d1fae5; color: #065f46; }
    .status-target-set { background: #dbeafe; color: #1e40af; }
    .status-dismissed { background: #fee2e2; color: #991b1b; }
    .ticket-expanded-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed #e5e7eb;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .ticket-expanded-section .exp-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 12px;
    }
    .ticket-expanded-section .exp-box h5 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #6b7280;
      margin: 0 0 6px 0;
    }
    .ticket-expanded-section .exp-val {
      font-size: 15px;
      font-weight: 700;
      color: #111827;
    }
    .ticket-expanded-section .exp-sub {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
    }
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      background: white;
      border-radius: 12px;
      border: 2px dashed #e5e7eb;
      color: #9ca3af;
    }
  </style>
</head>

<body>
  <div style="display:flex;width:100%;">
    <!-- SIDEBAR -->
    <div class="sidebar">
      <div>
        <a href="../landing/landing.html" class="logo">
          <img src="images/logo.png" alt="EnerTrack Logo" class="logo-icon">
          <img src="images/EnerTrack_text.png" alt="EnerTrack" class="logo-text">
        </a>
        <div class="menu">
          <div class="menu-item" data-page="finance_overview.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1" />
              <rect x="14" y="3" width="7" height="7" rx="1" />
              <rect x="14" y="14" width="7" height="7" rx="1" />
              <rect x="3" y="14" width="7" height="7" rx="1" />
            </svg>
            Overview
          </div>
          <div class="menu-item" data-page="finance_reports.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="9" y1="17" x2="9" y2="13" />
              <line x1="12" y1="17" x2="12" y2="11" />
              <line x1="15" y1="17" x2="15" y2="15" />
            </svg>
            Financial<br>Reports &amp; Impact
          </div>
          <div class="menu-item" data-page="finance_costs.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M7 9v3a5 5 0 0 0 10 0V9" />
              <line x1="10" y1="4" x2="10" y2="8" />
              <line x1="14" y1="4" x2="14" y2="8" />
              <path d="M12 17v3" />
            </svg>
            Utility Costs
          </div>
          <div class="menu-item active" data-page="finance_archives.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="21 8 21 21 3 21 3 8"></polyline>
              <rect x="1" y="3" width="22" height="5"></rect>
              <line x1="10" y1="12" x2="14" y2="12"></line>
            </svg>
            Archives
          </div>
        </div>
      </div>
      <div class="profile">
        <div class="profile-left">
          <img src="https://i.pravatar.cc/40?img=12">
          <div>
            <div class="profile-name" id="sidebarUserName">Aadithya Mouli</div>
            <div class="profile-role" id="sidebarUserRole">Finance Analyst</div>
          </div>
        </div>&#x22EE;
      </div>
    </div>

    <!-- CONTENT -->
    <div class="content">
      <div class="container">
        <h1 class="welcome">Archives</h1>
        <div class="sub">Past reports that have been processed and returned to the Sustainability Officer.</div>

        <!-- Archived Financial Reports -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;margin-top:24px;">
          <h3 style="margin:0;font-size:16px;color:#111827;">Archived Financial Reports</h3>
          <span id="archiveReportCount" style="background:#059669;color:white;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600;">0</span>
        </div>
        <div id="archiveReportContainer"></div>

        <!-- Archived Utility Invoices -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;margin-top:24px;">
          <h3 style="margin:0;font-size:16px;color:#111827;">Archived Utility Invoices</h3>
          <span id="archiveInvoiceCount" style="background:#059669;color:white;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600;">0</span>
        </div>
        <div id="archiveInvoiceContainer"></div>

        <!-- Archived Sustainability Reports -->
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;margin-top:32px;padding-top:24px;border-top:1px solid #e5e7eb;">
          <h3 style="margin:0;font-size:16px;color:#111827;">Archived Sustainability Reports</h3>
          <span id="archiveCount" style="background:#059669;color:white;padding:4px 12px;border-radius:20px;font-size:13px;font-weight:600;">0</span>
        </div>
        <div id="archiveContainer"></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { openModal, formatCurrency, badgeHTML, formatDate } from './js/utils/utils.js';

    document.addEventListener('DOMContentLoaded', () => {
      const stored = localStorage.getItem('currentUser');
      if (stored) {
        const user = JSON.parse(stored);
        document.getElementById('sidebarUserName').textContent = user.name;
        document.getElementById('sidebarUserRole').textContent = user.role;
      }

      const STATUS_MAP = {
        'Returned to SO': { label: 'Returned to SO',       cssClass: 'status-target-set' },
        'Target Set':     { label: 'Target Set by SO',     cssClass: 'status-target-set' },
        'Finalized':      { label: 'Finalized',            cssClass: 'status-finalized' },
        'Delivered':      { label: 'Delivered to Visitor', cssClass: 'status-finalized' },
        'Dismissed':      { label: 'Dismissed',            cssClass: 'status-dismissed' }
      };

      function render() {
        const raw = localStorage.getItem('enertrack_universal_v1');
        const data = raw ? JSON.parse(raw) : null;
        const reports = data?.workflow?.wastageReports || [];
        const archived = reports
          .filter(r => r.costImpact && (r.status === 'Returned to SO' || r.status === 'Target Set' || r.status === 'Finalized' || r.status === 'Delivered'))
          .sort((a, b) => new Date(b.returnedAt || b.forwardedAt || b.timestamp) - new Date(a.returnedAt || a.forwardedAt || a.timestamp));

        document.getElementById('archiveCount').textContent = archived.length;
        const container = document.getElementById('archiveContainer');

        if (archived.length === 0) {
          container.innerHTML = '<div class="empty-state"><p>No archived reports yet. Reports appear here after cost impact is returned to Sustainability.</p></div>';
          return;
        }

        container.innerHTML = archived.map(t => {
          const cfg = STATUS_MAP[t.status] || { label: t.status, cssClass: 'status-finalized' };
          const formatCurr = (v) => '₹' + Number(v).toLocaleString('en-IN');
          const ci = t.costImpact;
          const mt = t.metricTarget;
          const sd = t.systemData || {};

          let summaryText = '';
          let locationText = '';
          if (t.type === 'Energy') { summaryText = t.specificData?.observation || ''; locationText = t.specificData?.building || ''; }
          else if (t.type === 'Water') { summaryText = t.specificData?.nature || ''; locationText = t.specificData?.location || ''; }
          else if (t.type === 'Emissions') { summaryText = t.specificData?.observation || ''; locationText = t.specificData?.location || ''; }
          else if (t.type === 'Food') { summaryText = (t.specificData?.typeOfWastage || '') + ' (' + (t.specificData?.estimatedAmount || '?') + 'kg)'; locationText = t.specificData?.cafeteria || ''; }

          let narrativeParts = [];
          narrativeParts.push(`Finance completed cost impact assessment for this ${t.type.toLowerCase()} wastage report.`);
          if (ci) {
            narrativeParts.push(`Estimated loss <strong style="color:#dc2626;">${formatCurr(ci.estimatedLoss)}</strong>, remediation cost <strong>${formatCurr(ci.remediationCost)}</strong>, projected savings <strong style="color:#059669;">${formatCurr(ci.projectedSavings)}</strong>.`);
            narrativeParts.push(`ROI: <strong>${ci.roi != null ? ci.roi.toFixed(1) + '%' : '—'}</strong>, Payback: <strong>${ci.paybackPeriod != null ? ci.paybackPeriod.toFixed(1) + ' years' : '—'}</strong>.`);
          }
          if (mt) {
            narrativeParts.push(`Sustainability later set target <strong style="color:#1e40af;">${mt.value} ${mt.unit}</strong> by <strong>${new Date(mt.deadline).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</strong>.`);
          }

          let dataHTML = '';
          if (ci) {
            dataHTML += `<div class="exp-box"><h5>Financial Impact Assessment</h5><div style="display:flex;gap:12px;flex-wrap:wrap;"><div><div class="exp-sub">Est. Loss</div><div class="exp-val" style="color:#dc2626;">${formatCurr(ci.estimatedLoss)}</div></div><div><div class="exp-sub">Remediation</div><div class="exp-val">${formatCurr(ci.remediationCost)}</div></div><div><div class="exp-sub">Savings</div><div class="exp-val" style="color:#059669;">${formatCurr(ci.projectedSavings)}</div></div></div></div>`;
          }
          if (mt) {
            dataHTML += `<div class="exp-box"><h5>Sustainability Target</h5><div class="exp-val" style="color:#1e40af;">${mt.value} <small style="font-size:11px;font-weight:400;">${mt.unit}</small></div><div class="exp-sub">Deadline: ${new Date(mt.deadline).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</div></div>`;
          }
          if (sd.sensorId) {
            dataHTML += `<div class="exp-box"><h5>${t.type === 'Food' ? 'Wastage Assessment' : t.type === 'Water' ? 'Flow Monitoring' : t.type === 'Emissions' ? 'Emissions Monitoring' : 'Energy Meter Reading'} (${sd.sensorId})</h5><div style="display:flex;gap:12px;"><div><div class="exp-sub">Current</div><div class="exp-val">${sd.readingValue || '—'} <small style="font-size:11px;">${sd.readingUnit || ''}</small></div></div><div><div class="exp-sub">Baseline</div><div class="exp-val" style="color:#6b7280;">${sd.baselineValue || '—'} <small style="font-size:11px;">${sd.readingUnit || ''}</small></div></div></div></div>`;
          }

          let comparisonHTML = '';
          if (sd.baselineValue && sd.readingValue && mt) {
            const maxVal = Math.max(sd.readingValue, sd.baselineValue, parseFloat(mt.value) || 0) * 1.1;
            const baselineW = (sd.baselineValue / maxVal * 100).toFixed(1);
            const currentW = (sd.readingValue / maxVal * 100).toFixed(1);
            const targetW = ((parseFloat(mt.value) || 0) / maxVal * 100).toFixed(1);
            const unit = sd.readingUnit || '';
            comparisonHTML = `<div style="background:#f9fafb;border:1px solid #e5e7eb;border-radius:8px;padding:14px;margin-top:12px;"><h5 style="font-size:11px;text-transform:uppercase;letter-spacing:0.4px;color:#374151;margin:0 0 10px 0;">Before / After Comparison</h5><div style="display:flex;flex-direction:column;gap:8px;"><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:11px;color:#6b7280;width:60px;">Baseline</span><div style="flex:1;background:#e5e7eb;border-radius:4px;height:18px;overflow:hidden;"><div style="width:${baselineW}%;background:#9ca3af;height:100%;border-radius:4px;"></div></div><span style="font-size:12px;font-weight:600;color:#6b7280;min-width:60px;text-align:right;">${sd.baselineValue} ${unit}</span></div><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:11px;color:#6b7280;width:60px;">Current</span><div style="flex:1;background:#fecaca;border-radius:4px;height:18px;overflow:hidden;"><div style="width:${currentW}%;background:#dc2626;height:100%;border-radius:4px;"></div></div><span style="font-size:12px;font-weight:600;color:#dc2626;min-width:60px;text-align:right;">${sd.readingValue} ${unit}</span></div><div style="display:flex;align-items:center;gap:8px;"><span style="font-size:11px;color:#6b7280;width:60px;">Target</span><div style="flex:1;background:#bbf7d0;border-radius:4px;height:18px;overflow:hidden;"><div style="width:${targetW}%;background:#059669;height:100%;border-radius:4px;"></div></div><span style="font-size:12px;font-weight:600;color:#059669;min-width:60px;text-align:right;">${mt.value} ${unit}</span></div></div></div>`;
          }

          const processedAt = t.returnedAt || t.targetSetAt || t.finalizedAt || t.deliveredAt || t.timestamp;
          return `<div class="ticket-card"><div style="display:flex;justify-content:space-between;align-items:flex-start;width:100%;gap:16px;"><div style="flex:1;min-width:0;"><div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:4px;"><strong style="font-size:14px;color:var(--dark);">#${t.id}</strong><span style="background:#059669;color:white;padding:2px 8px;border-radius:4px;font-size:11px;margin-left:8px;">${t.type} Wastage</span></div><p style="font-size:13px;color:#374151;margin:0 0 6px 0;line-height:1.5;">${summaryText}</p><div class="ticket-location"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${locationText}</div><div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;"><span class="ticket-priority p-${t.priority || 'Low'}">${t.priority || 'Low'} Priority</span><span style="font-size:11px;color:#9ca3af;">Processed ${processedAt ? new Date(processedAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : ''}</span></div></div><div style="display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;"><span class="ticket-status ${cfg.cssClass}">${cfg.label}</span></div></div>${dataHTML ? `<div class="ticket-expanded-section">${dataHTML}</div>` : ''}<div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:14px;margin-top:12px;"><h5 style="font-size:11px;text-transform:uppercase;letter-spacing:0.4px;color:#065f46;margin:0 0 8px 0;">Decision Summary</h5><div style="font-size:12px;color:#374151;line-height:1.7;">${narrativeParts.map(p => '<p style="margin:0 0 6px 0;">' + p + '</p>').join('')}</div></div>${comparisonHTML}</div>`;
        }).join('');

        // Archived Financial Reports
        const finReports = data?.finance?.financialReports || [];
        const archivedFinReports = finReports.filter(r => r.archived === true);
        document.getElementById('archiveReportCount').textContent = archivedFinReports.length;
        const finReportContainer = document.getElementById('archiveReportContainer');
        if (archivedFinReports.length === 0) {
          finReportContainer.innerHTML = '<div class="empty-state"><p>No archived financial reports.</p></div>';
        } else {
          finReportContainer.innerHTML = archivedFinReports.map(r => {
            const statusMap = {
              'viable': { text: 'Viable', bg: '#d1fae5', color: '#065f46' },
              'marginal': { text: 'Marginal', bg: '#fef3c7', color: '#92400e' },
              'not-viable': { text: 'Not Viable', bg: '#fee2e2', color: '#b91c1c' }
            };
            const s = statusMap[r.status] || statusMap.marginal;
            return `<div class="ticket-card"><div style="display:flex;justify-content:space-between;align-items:center;"><div style="display:flex;flex-direction:column;"><strong style="font-size:14px;color:#111827;">${r.title}</strong><div style="font-size:12px;color:#6b7280;margin-top:4px;">Period: ${r.period} &nbsp;|&nbsp; Category: <span style="text-transform:capitalize">${r.category}</span> &nbsp;|&nbsp; Scope: ${r.scopeLabel}</div></div><div style="display:flex;gap:12px;align-items:center;"><span style="background:${s.bg};color:${s.color};padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;">${s.text}</span><button onclick="window.viewArchivedReport('${r.id}')" style="background:#f3f4f6;border:1px solid #d1d5db;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;color:#374151;">View</button></div></div><div class="ticket-expanded-section"><div class="exp-box"><h5>Return on Investment</h5><div class="exp-val">${r.roi != null ? r.roi + '%' : '—'}</div></div><div class="exp-box"><h5>Net Present Value</h5><div class="exp-val">${r.npv != null ? '₹' + Number(r.npv).toLocaleString() : '—'}</div></div></div></div>`;
          }).join('');
        }

        // Archived Invoices
        const invoices = data?.finance?.invoices || [];
        const archivedInvoices = invoices.filter(i => i.archived === true);
        document.getElementById('archiveInvoiceCount').textContent = archivedInvoices.length;
        const invContainer = document.getElementById('archiveInvoiceContainer');
        if (archivedInvoices.length === 0) {
          invContainer.innerHTML = '<div class="empty-state"><p>No archived utility invoices.</p></div>';
        } else {
          invContainer.innerHTML = archivedInvoices.map(i => {
            return `<div class="ticket-card"><div style="display:flex;justify-content:space-between;align-items:center;"><div style="display:flex;flex-direction:column;"><strong style="font-size:14px;color:#111827;">${i.invoiceNumber} — ${i.vendor}</strong><div style="font-size:12px;color:#6b7280;margin-top:4px;">Dept: ${i.departmentLabel} &nbsp;|&nbsp; Type: <span style="text-transform:capitalize">${i.type}</span> &nbsp;|&nbsp; Due: ${new Date(i.dueDate).toLocaleDateString()}</div></div><div style="text-align:right;display:flex;align-items:center;gap:16px;"><div><div style="font-size:16px;font-weight:700;color:#111827;">₹${Number(i.amount).toLocaleString()}</div><span style="color:#059669;font-size:11px;font-weight:600;">Approved by ${i.approvedBy || 'Analyst'}</span></div><button onclick="window.viewArchivedInvoice('${i.id}')" style="background:#f3f4f6;border:1px solid #d1d5db;border-radius:6px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;color:#374151;">View</button></div></div></div>`;
          }).join('');
        }
      }

      window.viewArchivedReport = function(id) {
        const raw = localStorage.getItem('enertrack_universal_v1');
        const data = raw ? JSON.parse(raw) : null;
        const rep = data?.finance?.financialReports?.find(r => r.id === id);
        if (!rep) return;
        openModal({
          title: rep.title + " (Archived)",
          bodyHTML: `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;font-size:14px">
            <div><strong>Period</strong><p>${rep.period}</p></div>
            <div><strong>Category</strong><p style="text-transform:capitalize">${rep.category}</p></div>
            <div><strong>Scope</strong><p>${rep.scopeLabel}</p></div>
            <div><strong>Format</strong><p>${rep.format}</p></div>
            <div><strong>ROI</strong><p>${rep.roi != null ? rep.roi + "%" : "—"}</p></div>
            <div><strong>NPV</strong><p>${rep.npv != null ? formatCurrency(rep.npv) : "—"}</p></div>
            <div><strong>Payback Period</strong><p>${rep.paybackYears != null ? rep.paybackYears + " yrs" : "—"}</p></div>
            <div><strong>Status</strong><p>${badgeHTML(rep.status)}</p></div>
          </div>
          <div style="margin-top:14px;padding:12px;background:#f9fafb;border-radius:8px;font-size:13px;color:#374151">
            <strong>Notes:</strong> ${rep.notes || "—"}
          </div>`,
          confirmLabel: "Close",
          cancelLabel: ""
        });
      };

      window.viewArchivedInvoice = function(id) {
        const raw = localStorage.getItem('enertrack_universal_v1');
        const data = raw ? JSON.parse(raw) : null;
        const inv = data?.finance?.invoices?.find(i => i.id === id);
        if (!inv) return;
        openModal({
          title: `Invoice ${inv.invoiceNumber} (Archived)`,
          bodyHTML: `<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px 24px;font-size:14px">
            <div><strong>Vendor</strong><p>${inv.vendor}</p></div>
            <div><strong>Amount</strong><p>${formatCurrency(inv.amount)}</p></div>
            <div><strong>Department</strong><p>${inv.departmentLabel}</p></div>
            <div><strong>Type</strong><p style="text-transform:capitalize">${inv.type}</p></div>
            <div><strong>Issued</strong><p>${formatDate(inv.issuedDate)}</p></div>
            <div><strong>Due Date</strong><p>${formatDate(inv.dueDate)}</p></div>
            <div><strong>Status</strong><p>${badgeHTML(inv.status)}</p></div>
            <div><strong>Approved By</strong><p>${inv.approvedBy ?? "—"}</p></div>
          </div>`,
          confirmLabel: "Close",
          cancelLabel: ""
        });
      };

      render();
      window.addEventListener('storage', e => { if (e.key === 'enertrack_universal_v1') render(); });

      // Wire sidebar navigation
      document.querySelectorAll('.menu-item[data-page]').forEach(item => {
        item.style.cursor = 'pointer';
        item.addEventListener('click', () => {
          window.location.href = item.dataset.page;
        });
      });
    });
  </script>
  <script src="../dashboardProfileMenu.js"></script>
</body>

</html>
