<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EnerTrack – My Archives</title>
  <link rel="stylesheet" href="../technician/tech_shared.css">
  <style>
    .ticket-card {
      background: white;
      padding: 18px 20px;
      border-radius: 12px;
      border: 1.5px solid var(--border);
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      gap: 0;
      transition: box-shadow .2s;
    }

    .ticket-card:hover {
      box-shadow: 0 4px 12px -2px var(--shadow);
    }

    .ticket-location {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: #374151;
      background: #f3f4f6;
      padding: 2px 8px;
      border-radius: 4px;
      margin-top: 6px;
    }

    .ticket-priority {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 20px;
      font-weight: 600;
      display: inline-block;
    }

    .p-Low { background: #f0fdf4; color: #166534; }
    .p-Medium { background: #fffbeb; color: #92400e; }
    .p-High { background: #fef2f2; color: #991b1b; }

    .ticket-status {
      display: inline-block;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      white-space: nowrap;
    }

    .status-finalized { background: #d1fae5; color: #065f46; }
    .status-target-set { background: #d1fae5; color: #065f46; }
    .status-dismissed { background: #fee2e2; color: #991b1b; }

    .ticket-count {
      background: #6b7280;
      color: white;
      border-radius: 20px;
      padding: 2px 8px;
      font-size: 12px;
    }

    .empty-state {
      text-align: center;
      padding: 48px 24px;
      background: white;
      border-radius: 12px;
      border: 2px dashed var(--border);
    }

    .empty-state p {
      color: #9ca3af;
      font-size: 14px;
      margin-top: 12px;
    }

    .ticket-expanded-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px dashed #e5e7eb;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .ticket-expanded-section .exp-box {
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 10px 12px;
    }

    .ticket-expanded-section .exp-box h5 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #6b7280;
      margin: 0 0 6px 0;
    }

    .ticket-expanded-section .exp-val {
      font-size: 15px;
      font-weight: 700;
      color: #111827;
    }

    .ticket-expanded-section .exp-sub {
      font-size: 11px;
      color: #9ca3af;
      margin-top: 2px;
    }
  </style>
</head>

<body>
  <div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
      <div>
        <a href="../landing/landing.html" class="logo">
          <img src="../finance-analyst/images/logo.png" alt="EnerTrack Logo" class="logo-icon">
          <img src="../finance-analyst/images/EnerTrack_text.png" alt="EnerTrack" class="logo-text">
        </a>
        <div class="nav-title">Navigation</div>
        <ul class="nav">
          <a href="enduser_dashboard.html">
            <li>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"></path>
                <line x1="4" y1="22" x2="4" y2="15"></line>
              </svg>
              Report an Issue
            </li>
          </a>
          <a href="enduser_wastage.html">
            <li>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
              </svg>
              Report Wastage
            </li>
          </a>
          <a href="enduser_archives.html">
            <li class="active">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <polyline points="21 8 21 21 3 21 3 8"></polyline>
                <rect x="1" y="3" width="22" height="5"></rect>
                <line x1="10" y1="12" x2="14" y2="12"></line>
              </svg>
              My Archives
            </li>
          </a>
        </ul>
      </div>
      <div class="profile" style="display:flex; align-items:center; gap:12px;">
        <img src="https://i.pravatar.cc/40?img=12" alt="User Profile" style="border-radius:50%;">
        <div>
          <div class="profile-name" id="sidebarUserName">Campus Visitor</div>
          <div class="profile-role" id="sidebarUserRole">Campus Visitor</div>
        </div>
      </div>
    </aside>

    <!-- MAIN -->
    <main class="main">
      <div class="header-row">
        <div class="page-header">
          <h1>My Archives</h1>
          <p>Previously resolved wastage reports that have been archived.</p>
        </div>
      </div>

      <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
        <h3 style="margin:0;font-size:16px;color:#111827;">Archived Reports</h3>
        <span class="ticket-count" id="archiveCount">0</span>
      </div>

      <div id="archiveContainer">
        <!-- Populated by JS -->
      </div>
    </main>
  </div>

  <script type="module">
    document.addEventListener('DOMContentLoaded', () => {
      const stored = localStorage.getItem('currentUser');
      if (!stored) { window.location.href = '../sign_in/sign_in.html'; return; }
      const user = JSON.parse(stored);

      // One-time backfill for legacy dismissed reports.
      (function backfillDismissedArchives() {
        const raw = localStorage.getItem('enertrack_universal_v1');
        if (!raw) return;
        const data = JSON.parse(raw);
        const reports = data?.workflow?.wastageReports || [];
        let changed = false;
        reports.forEach((r) => {
          if (r.status === 'Dismissed' && !r.archived) {
            r.archived = true;
            r.archivedAt = r.dismissedAt || new Date().toISOString();
            changed = true;
          }
        });
        if (changed) {
          localStorage.setItem('enertrack_universal_v1', JSON.stringify(data));
        }
      })();

      document.getElementById('sidebarUserName').textContent = user.name;
      document.getElementById('sidebarUserRole').textContent = user.role;

      const STATUS_MAP = {
        'Finalized':  { label: 'Resolved',          cssClass: 'status-finalized' },
        'Target Set': { label: 'Target Set',         cssClass: 'status-target-set' },
        'Delivered':  { label: 'Report Delivered',    cssClass: 'status-finalized' },
        'Dismissed':  { label: 'Dismissed',           cssClass: 'status-dismissed' }
      };

      function renderArchives() {
        const container = document.getElementById('archiveContainer');
        const countBadge = document.getElementById('archiveCount');

        // Read directly from localStorage for fresh data (avoids stale universalDB cache)
        const raw = localStorage.getItem('enertrack_universal_v1');
        const data = raw ? JSON.parse(raw) : null;
        const archived = (data?.workflow?.wastageReports || [])
          .filter(wr => wr.reporterEmail === user.email && wr.archived)
          .sort((a, b) => new Date(b.archivedAt || b.timestamp) - new Date(a.archivedAt || a.timestamp));

        countBadge.textContent = archived.length;

        if (archived.length === 0) {
          container.innerHTML = `<div class="empty-state"><p>No archived reports yet. Resolved reports can be archived from the Report Wastage page.</p></div>`;
          return;
        }

        container.innerHTML = archived.map(t => {
          const cfg = STATUS_MAP[t.status] || { label: t.status, cssClass: 'status-finalized' };
          const formatCurr = (v) => '₹' + Number(v).toLocaleString('en-IN');
          const ci = t.costImpact;
          const mt = t.metricTarget;
          const sd = t.systemData || {};

          let summaryText = '';
          let locationText = '';
          if (t.type === 'Energy') { summaryText = t.specificData?.observation || ''; locationText = t.specificData?.building || ''; }
          else if (t.type === 'Water') { summaryText = t.specificData?.nature || ''; locationText = t.specificData?.location || ''; }
          else if (t.type === 'Emissions') { summaryText = t.specificData?.observation || ''; locationText = t.specificData?.location || ''; }
          else if (t.type === 'Food') { summaryText = (t.specificData?.typeOfWastage || '') + ' (' + (t.specificData?.estimatedAmount || '?') + 'kg)'; locationText = t.specificData?.cafeteria || ''; }

          let expandedHTML = '';
          let narrativeParts = [];
          narrativeParts.push(`This ${t.type.toLowerCase()} wastage report was reviewed and validated by the Sustainability Officer, confirming it as a substantiated concern requiring remediation.`);
          if (ci) {
            narrativeParts.push(`Following financial due diligence, the Finance Analyst determined that the estimated economic impact of this issue amounts to <strong style="color:#dc2626;">${formatCurr(ci.estimatedLoss)}</strong> in projected losses if left unresolved. The recommended remediation cost stands at <strong>${formatCurr(ci.remediationCost)}</strong>, with an anticipated annual saving of <strong style="color:#059669;">${formatCurr(ci.projectedSavings)}</strong> upon implementation.`);
          }
          if (mt) {
            narrativeParts.push(`In response, the Sustainability Officer has established a revised ${t.type.toLowerCase()} reduction target of <strong style="color:#1e40af;">${mt.value} ${mt.unit}</strong>, effective until <strong>${new Date(mt.deadline).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</strong>.`);
          }
          if (t.status === 'Dismissed') {
            narrativeParts.push(`This report was dismissed by the Sustainability Officer. Reason: <strong>${t.dismissReason || 'Not specified'}</strong>.`);
          } else {
            narrativeParts.push('This report has been formally closed and archived for your records.');
          }

          expandedHTML = `
            <div style="background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:14px;margin-top:12px;">
              <h5 style="font-size:11px;text-transform:uppercase;letter-spacing:0.4px;color:#065f46;margin:0 0 8px 0;">Decision Summary</h5>
              <div style="font-size:12px;color:#374151;line-height:1.7;">
                ${narrativeParts.map(p => '<p style="margin:0 0 6px 0;">' + p + '</p>').join('')}
              </div>
            </div>`;

          let dataHTML = '';
          if (ci) {
            dataHTML += `<div class="exp-box"><h5>Financial Impact Assessment</h5><div style="display:flex;gap:12px;flex-wrap:wrap;"><div><div class="exp-sub">Est. Loss</div><div class="exp-val" style="color:#dc2626;">${formatCurr(ci.estimatedLoss)}</div></div><div><div class="exp-sub">Remediation</div><div class="exp-val">${formatCurr(ci.remediationCost)}</div></div><div><div class="exp-sub">Savings</div><div class="exp-val" style="color:#059669;">${formatCurr(ci.projectedSavings)}</div></div></div></div>`;
          }
          if (mt) {
            dataHTML += `<div class="exp-box"><h5>Sustainability Target</h5><div class="exp-val" style="color:#1e40af;">${mt.value} <small style="font-size:11px;font-weight:400;">${mt.unit}</small></div><div class="exp-sub">Deadline: ${new Date(mt.deadline).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' })}</div></div>`;
          }
          if (dataHTML) {
            expandedHTML = `<div class="ticket-expanded-section">${dataHTML}</div>` + expandedHTML;
          }

          return `
            <div class="ticket-card">
              <div style="display:flex;justify-content:space-between;align-items:flex-start;width:100%;gap:16px;">
                <div style="flex:1;min-width:0;">
                  <div style="display:flex;align-items:center;flex-wrap:wrap;gap:4px;margin-bottom:4px;">
                    <strong style="font-size:14px;color:var(--dark);">#${t.id}</strong>
                    <span style="background:#059669;color:white;padding:2px 8px;border-radius:4px;font-size:11px;margin-left:8px;">${t.type} Wastage</span>
                  </div>
                  <p style="font-size:13px;color:#374151;margin:0 0 6px 0;line-height:1.5;">${summaryText}</p>
                  <div class="ticket-location">
                    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                    ${locationText}
                  </div>
                  <div style="margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;align-items:center;">
                    <span class="ticket-priority p-${t.priority || 'Low'}">${t.priority || 'Low'} Priority</span>
                    <span style="font-size:11px;color:#9ca3af;">Archived ${t.archivedAt ? new Date(t.archivedAt).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : ''}</span>
                  </div>
                </div>
                <div style="display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;">
                  <span class="ticket-status ${cfg.cssClass}">${cfg.label}</span>
                </div>
              </div>
              ${expandedHTML}
            </div>`;
        }).join('');
      }

      renderArchives();

      // Re-render when localStorage changes from another tab
      window.addEventListener('storage', (e) => {
        if (e.key === 'enertrack_universal_v1') renderArchives();
      });
    });
  </script>
  <script src="../dashboardProfileMenu.js"></script>
</body>

</html>
