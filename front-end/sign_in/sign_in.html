<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnerTrack Login</title>
    <link rel="stylesheet" href="sign_in.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- BACKGROUND -->
    <div class="background">
        <img src="images/Background_image.png" alt="background">
    </div>

    <!-- TOP BAR (logo overlaid on background) -->
    <div class="top-bar">
        <div class="logo">
            <img src="images/logo.png" alt="EnerTrack Logo">
        </div>
    </div>

    <!-- MAIN WRAPPER -->
    <div class="main">

        <!-- CARD -->
        <div class="card">

            <h1>Sign In</h1>
            <p class="sub">or <a href="#" class="create-link">create an account</a></p>

            <form id="signInForm" novalidate>
                <input type="email" id="email" placeholder="yourname@gmail.com" class="input" autocomplete="off" required autofocus maxlength="50">
                <span class="field-error" id="emailError"></span>

                <div class="password-wrap">
                    <input type="password" id="password" placeholder="··········" class="input" autocomplete="new-password" minlength="8" required maxlength="50">
                <span class="eye" id="togglePassword" onclick="togglePass()">
                    <!-- Crossed-out eye (password hidden) -->
                    <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C6 20 1.73 14 1.73 12c0-.9.6-2.3 1.7-3.7" />
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6 0 10.27 6 10.27 8 0 .73-.22 1.6-.67 2.5" />
                        <line x1="1" y1="1" x2="23" y2="23" />
                    </svg>
                    <!-- Open eye (password visible) -->
                    <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round"
                        stroke-linejoin="round" style="display:none;">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    </span>
                </div>
            <span class="field-error" id="passwordError"></span>

            <div class="options">
                <label class="remember">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember Me</span>
                </label>
                <a href="#" class="forgot" onclick="alert('Check your mail for password updation')">Forgot your password?</a>
            </div>

            <!-- ROLE SELECTION -->
            <div class="roles">
                <button type="button" class="role active" id="role-admin" onclick="selectRole(this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;margin-bottom:8px;"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    <p>System Administrator</p>
                </button>
                <button type="button" class="role" id="role-analyst" onclick="selectRole(this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;margin-bottom:8px;"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
                    <p>Financial Analyst</p>
                </button>
                <button type="button" class="role" id="role-tech" onclick="selectRole(this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;margin-bottom:8px;"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"></path></svg>
                    <p>Technician</p>
                </button>
                <button type="button" class="role" id="role-sustain" onclick="selectRole(this)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:24px;height:24px;margin-bottom:8px;"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 3.5 2 8a7 7 0 0 1-7 7c0 1 0 3-2 3z"></path><path d="M7 16l-4 4"></path><path d="M13 16l4 4"></path></svg>
                    <p>Sustainability Officer</p>
                </button>
            </div>

            <button type="submit" class="btn" id="signInBtn">Sign In</button>
            </form>

            <div class="footer">
                <p>Don't have an account?</p>
                <a href="#" class="register-link">Register</a>
            </div>

        </div>

    </div>

    <!-- Validation Logic -->
    <script src="sign_in.js"></script>

</body>

</html>
