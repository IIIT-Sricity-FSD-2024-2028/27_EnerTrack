<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EnerTrack Login</title>
    <link rel="stylesheet" href="sign_in.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400;1,600&display=swap"
        rel="stylesheet">
</head>

<body>

    <!-- BACKGROUND -->
    <div class="background">
        <img src="images/Background_image.png" alt="background">
    </div>

    <!-- TOP BAR (logo overlaid on background) -->
    <div class="top-bar">
        <div class="logo">
            <img src="images/logo.png" alt="EnerTrack Logo">
        </div>
    </div>

    <!-- MAIN WRAPPER -->
    <div class="main">

        <!-- CARD -->
        <div class="card">

            <h1>Sign In</h1>
            <p class="sub">or <a href="#" class="create-link">create an account</a></p>

            <input type="email" id="email" placeholder="yourname@gmail.com" class="input" autocomplete="off">
            <span class="field-error" id="emailError"></span>

            <div class="password-wrap">
                <input type="password" id="password" placeholder="··········" class="input" autocomplete="new-password">
                <span class="eye" id="togglePassword" onclick="togglePass()">
                    <!-- Crossed-out eye (password hidden) -->
                    <svg id="eyeClosed" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round"
                        stroke-linejoin="round">
                        <path d="M17.94 17.94A10.94 10.94 0 0 1 12 20C6 20 1.73 14 1.73 12c0-.9.6-2.3 1.7-3.7" />
                        <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c6 0 10.27 6 10.27 8 0 .73-.22 1.6-.67 2.5" />
                        <line x1="1" y1="1" x2="23" y2="23" />
                    </svg>
                    <!-- Open eye (password visible) -->
                    <svg id="eyeOpen" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
                        fill="none" stroke="rgba(255,255,255,0.7)" stroke-width="1.8" stroke-linecap="round"
                        stroke-linejoin="round" style="display:none;">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                </span>
            </div>
            <span class="field-error" id="passwordError"></span>

            <div class="options">
                <label class="remember">
                    <input type="checkbox" id="rememberMe">
                    <span>Remember Me</span>
                </label>
                <a href="#" class="forgot">Forgot your password?</a>
            </div>

            <!-- ROLE SELECTION -->
            <div class="roles">
                <button class="role active" id="role-admin" onclick="selectRole(this)">
                    <img src="images/admin_logo.png">
                    <p>System<br>Administrator</p>
                </button>
                <button class="role" id="role-analyst" onclick="selectRole(this)">
                    <img src="images/FA_logo.png">
                    <p>Financial<br>Analyst</p>
                </button>
                <button class="role" id="role-tech" onclick="selectRole(this)">
                    <img src="images/T_logo.png">
                    <p>Technician</p>
                </button>
                <button class="role" id="role-sustain" onclick="selectRole(this)">
                    <img src="images/SO_png.png">
                    <p>Sustainability<br>Officer</p>
                </button>
            </div>

            <button class="btn" id="signInBtn" onclick="handleSignIn()">Sign In</button>

            <div class="footer">
                <p>Don't have an account?</p>
                <a href="#" class="register-link">Register</a>
            </div>

        </div>

    </div>

    <script>
        // Toggle password visibility and eye icon
        function togglePass() {
            const pwd = document.getElementById('password');
            const eyeClosed = document.getElementById('eyeClosed');
            const eyeOpen = document.getElementById('eyeOpen');
            const isHidden = pwd.type === 'password';
            pwd.type = isHidden ? 'text' : 'password';
            eyeClosed.style.display = isHidden ? 'none' : 'block';
            eyeOpen.style.display = isHidden ? 'block' : 'none';
        }

        // Role selection
        function selectRole(el) {
            document.querySelectorAll('.role').forEach(r => r.classList.remove('active'));
            el.classList.add('active');
        }

        // Sign In handler with Gmail-style inline validation
        function handleSignIn() {
            const emailEl = document.getElementById('email');
            const pwdEl = document.getElementById('password');
            const emailErr = document.getElementById('emailError');
            const pwdErr = document.getElementById('passwordError');
            let valid = true;

            // Reset errors
            emailEl.classList.remove('input-error');
            pwdEl.classList.remove('input-error');
            emailErr.textContent = '';
            pwdErr.textContent = '';

            if (!emailEl.value.trim()) {
                emailEl.classList.add('input-error');
                emailErr.textContent = 'Enter an email or phone number';
                emailEl.focus();
                valid = false;
            } else if (!/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(emailEl.value.trim())) {
                emailEl.classList.add('input-error');
                emailErr.textContent = 'Enter a valid email address';
                emailEl.focus();
                valid = false;
            } else if (!pwdEl.value) {
                pwdEl.classList.add('input-error');
                pwdErr.textContent = 'Enter a password';
                pwdEl.focus();
                valid = false;
            }

            if (!valid) return;
            // Add actual sign-in logic here
        }

        // Clear errors on focus
        document.getElementById('email').addEventListener('focus', function () {
            this.classList.remove('input-error');
            document.getElementById('emailError').textContent = '';
        });
        document.getElementById('password').addEventListener('focus', function () {
            this.classList.remove('input-error');
            document.getElementById('passwordError').textContent = '';
        });
    </script>

</body>

</html>
